<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>ToonHQ Notify</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --red: #9b151d;
            --red-dark: #6e0e14;
            --red-light: #c9282f;
            --cream: #fdf6e3;
            --gold: #f5c518;
            --blue: #1a6ea8;
            --green: #2a9d3e;
            --purple: #7b3fa0;
            --text: #2b1a1a;
            --muted: #7a5c5c;
            --card-bg: #fff8f0;
            --border: #e8d5c4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 340px;
            background: var(--cream);
            font-family: 'Nunito', sans-serif;
            color: var(--text);
            overflow-x: hidden;
        }

        .header {
            background: var(--red);
            padding: 14px 16px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            right: 0;
            height: 20px;
            background: var(--cream);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
        }

        .header-icon {
            font-size: 28px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .header-title {
            font-family: 'Fredoka One', cursive;
            font-size: 20px;
            color: #fff;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            line-height: 1;
        }

        .header-sub {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.75);
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .status-bar {
            margin: 16px 14px 0;
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ccc;
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .status-dot.watching {
            background: var(--gold);
            box-shadow: 0 0 6px var(--gold);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        .status-text {
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .status-text span {
            color: var(--red);
        }

        .clear-btn {
            font-size: 11px;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            color: var(--muted);
            background: none;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            padding: 3px 9px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .clear-btn:hover {
            border-color: var(--red);
            color: var(--red);
        }

        .section-label {
            font-family: 'Fredoka One', cursive;
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 14px 16px 6px;
        }

        .sub-label {
            font-family: 'Fredoka One', cursive;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            padding: 4px 14px 5px;
        }

        .tabs {
            display: flex;
            gap: 5px;
            padding: 0 14px 8px;
        }

        .tab {
            flex: 1;
            font-family: 'Fredoka One', cursive;
            font-size: 11px;
            letter-spacing: 0.3px;
            padding: 7px 2px;
            border-radius: 8px;
            border: 2px solid var(--border);
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
            background: var(--card-bg);
            color: var(--muted);
        }

        .tab:hover {
            transform: translateY(-1px);
        }

        .tab.active-tab {
            color: #fff;
            border-color: transparent;
        }

        .tab[data-cat="bosses"].active-tab {
            background: var(--red);
        }

        .tab[data-cat="buildings"].active-tab {
            background: var(--blue);
        }

        .tab[data-cat="facilities"].active-tab {
            background: var(--purple);
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            padding: 0 14px 10px;
        }

        .opt-grid-5 {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            padding: 0 14px 10px;
        }

        .opt-grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            padding: 0 14px 10px;
        }

        .opt-grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            padding: 0 14px 10px;
        }

        /* Standard keyword buttons */
        .activity-btn {
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 12.5px;
            padding: 9px 10px;
            border-radius: 9px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
            line-height: 1.3;
        }

        .activity-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.12);
        }

        .activity-btn.selected {
            border-color: transparent;
            color: #fff;
            background: var(--red);
            box-shadow: 0 3px 10px rgba(155, 21, 29, 0.35);
            transform: translateY(-1px);
        }

        .activity-btn[data-cat="facilities"].selected {
            background: var(--purple);
            box-shadow: 0 3px 10px rgba(123, 63, 160, 0.35);
        }

        /* Combo selector primary buttons (corp type, factory type) */
        .cat-btn {
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 12.5px;
            padding: 9px 10px;
            border-radius: 9px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
            line-height: 1.3;
        }

        .cat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.12);
        }

        .cat-btn[data-type="corp"].selected {
            border-color: transparent;
            color: #fff;
            background: var(--blue);
            box-shadow: 0 3px 10px rgba(26, 110, 168, 0.35);
            transform: translateY(-1px);
        }

        .cat-btn[data-type="factory"].selected {
            border-color: transparent;
            color: #fff;
            background: var(--purple);
            box-shadow: 0 3px 10px rgba(123, 63, 160, 0.35);
            transform: translateY(-1px);
        }

        /* Optional sub-selector buttons (story, length, star, shopping) */
        .opt-btn {
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 11px;
            padding: 7px 4px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
        }

        .opt-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.12);
        }

        .opt-btn[data-type="story"].selected {
            border-color: transparent;
            color: #fff;
            background: var(--blue);
            box-shadow: 0 3px 10px rgba(26, 110, 168, 0.35);
        }

        .opt-btn[data-type="length"].selected {
            border-color: transparent;
            color: #fff;
            background: var(--purple);
            box-shadow: 0 3px 10px rgba(123, 63, 160, 0.35);
        }

        .activity-btn[data-type1="star"].selected {
            border-color: transparent;
            color: var(--text);
            background: var(--gold);
            box-shadow: 0 3px 10px rgba(245, 197, 24, 0.4);
        }

        .opt-btn[data-type="shopping"].selected {
            border-color: transparent;
            color: #fff;
            background: var(--red);
            box-shadow: 0 3px 10px rgba(155, 21, 29, 0.35);
        }

        /* Preview boxes */
        .combo-preview {
            margin: 0 14px 10px;
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            border-radius: 9px;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            min-height: 36px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }

        .preview-tag {
            color: #fff;
            border-radius: 5px;
            padding: 2px 7px;
            font-size: 10.5px;
            font-weight: 700;
        }

        .preview-tag.blue {
            background: var(--blue);
        }

        .preview-tag.purple {
            background: var(--purple);
        }

        .divider {
            height: 1.5px;
            background: var(--border);
            margin: 2px 14px 12px;
            border-radius: 2px;
        }

        .watch-wrap {
            padding: 0 14px 16px;
        }

        .watch-btn {
            width: 100%;
            font-family: 'Fredoka One', cursive;
            font-size: 16px;
            letter-spacing: 0.5px;
            padding: 12px;
            border-radius: 11px;
            border: none;
            background: var(--red);
            color: #fff;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 12px rgba(155, 21, 29, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .watch-btn:hover:not(:disabled) {
            background: var(--red-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(155, 21, 29, 0.4);
        }

        .watch-btn:disabled {
            background: #c9b8b8;
            box-shadow: none;
            cursor: not-allowed;
        }

        .watch-btn.watching-state {
            background: var(--gold);
            color: var(--text);
            box-shadow: 0 4px 12px rgba(245, 197, 24, 0.4);
        }

        .watch-btn.watching-state:hover:not(:disabled) {
            background: #e6b800;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        #ttr-eyes {
            height: 55px;
            width: 70px;
            margin-left: auto;
            padding-right: 15px;
            opacity: 0.9;
            transform: rotate(10deg);
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-icon">🔔</div>
        <div>
            <div class="header-title">ToonHQ Notify</div>
            <div class="header-sub">Group Match Alerts</div>
        </div>
        <img src="TTReyes.png" id="ttr-eyes" />
    </div>

    <div class="status-bar">
        <div class="status-left">
            <div class="status-dot" id="statusDot"></div>
            <div class="status-text" id="statusText">Not watching</div>
        </div>
        <button class="clear-btn" id="clearBtn">Clear</button>
    </div>

    <div class="section-label">Select Activity</div>

    <div class="tabs">
        <div class="tab active-tab" data-cat="bosses">💼 Bosses</div>
        <div class="tab" data-cat="buildings">🏢 Buildings</div>
        <div class="tab" data-cat="facilities">🏭 Facilities</div>
    </div>

    <!-- BOSSES PANEL -->
    <div class="panel active" id="panel-bosses">

        <div class="sub-label">Boss Battles</div>
        <div class="btn-grid">
            <button class="activity-btn" data-cat="bosses" data-keyword="VP">VP</button>
            <button class="activity-btn" data-cat="bosses" data-keyword="CFO">CFO</button>
            <button class="activity-btn" data-cat="bosses" data-keyword="CJ">CJ</button>
            <button class="activity-btn" data-cat="bosses" data-keyword="CEO">CEO</button>
        </div>

        <div class="sub-label">VP Shopping (optional)</div>
        <div class="opt-grid-2">
            <button class="activity-btn" data-cat="bosses" data-keyword="NO SHOPPING VP">No Shopping</button>
            <button class="activity-btn" data-cat="bosses" data-keyword="SOS SHOPPING VP">Shopping</button>
        </div>

        <div class="sub-label">Field Offices</div>
        <div class="btn-grid">
            <button class="activity-btn" data-cat="bosses" data-keyword="FIELD OFFICE">Any Star</button>
        </div>
        <div class="sub-label">Star Rating (optional)</div>
        <div class="opt-grid-4">
            <button class="activity-btn" data-type1="star" data-cat="bosses" data-keyword="ONE STAR">1 ⭐</button>
            <button class="activity-btn" data-type1="star" data-cat="bosses" data-keyword="TWO STAR">2 ⭐</button>
            <button class="activity-btn" data-type1="star" data-cat="bosses" data-keyword="THREE STAR">3 ⭐</button>
            <button class="activity-btn" data-type1="star" data-cat="bosses" data-keyword="FOUR STAR">4 ⭐</button>
        </div>

    </div>

    <!-- BUILDINGS PANEL -->
    <div class="panel" id="panel-buildings">
        <div class="sub-label">Corp Type</div>
        <div class="btn-grid">
            <button class="cat-btn" data-type="corp" data-value="SELLBOT BUILDING">Sellbot</button>
            <button class="cat-btn" data-type="corp" data-value="CASHBOT BUILDING">Cashbot</button>
            <button class="cat-btn" data-type="corp" data-value="LAWBOT BUILDING">Lawbot</button>
            <button class="cat-btn" data-type="corp" data-value="BOSSBOT BUILDING">Bossbot</button>
        </div>
        <div class="sub-label">Stories (optional)</div>
        <div class="opt-grid-5">
            <button class="opt-btn" data-type="story" data-value="ONE STORY">1</button>
            <button class="opt-btn" data-type="story" data-value="TWO STORY">2</button>
            <button class="opt-btn" data-type="story" data-value="THREE STORY">3</button>
            <button class="opt-btn" data-type="story" data-value="FOUR STORY">4</button>
            <button class="opt-btn" data-type="story" data-value="FIVE STORY">5</button>
        </div>
        <!--<div class="sub-label">Will search for</div>
        <div class="combo-preview" id="buildingPreview">
            <span id="buildingPlaceholder" style="color:var(--muted)">Select corp type above</span>
        </div> -->
    </div>

    <!-- FACILITIES PANEL -->
    <div class="panel" id="panel-facilities">

        <div class="sub-label">Sellbot Factories</div>
        <div class="btn-grid">
            <button class="activity-btn" data-cat="facilities" data-keyword="SHORT SCRAP">Short Scrap</button>
            <button class="activity-btn" data-cat="facilities" data-keyword="LONG SCRAP">Long Scrap</button>
            <button class="activity-btn" data-cat="facilities" data-keyword="SHORT STEEL">Short Steel</button>
            <button class="activity-btn" data-cat="facilities" data-keyword="LONG STEEL">Long Steel</button>
        </div>

        <div class="divider"></div>

        <div class="sub-label">Cashbot Mints</div>
        <div class="btn-grid">
            <button class="activity-btn" data-cat="facilities" data-keyword="COIN">Coin Mint</button>
            <button class="activity-btn" data-cat="facilities" data-keyword="BULLION">Bullion Mint</button>
        </div>

        <div class="sub-label">Lawbot DA Offices</div>
        <div class="btn-grid">
            <button class="activity-btn" data-cat="facilities" data-keyword="DA OFFICE JUNIOR">DA Junior</button>
            <button class="activity-btn" data-cat="facilities" data-keyword="DA OFFICE SENIOR">DA Senior</button>
        </div>

        <div class="sub-label">Cog Golf Courses</div>
        <div class="btn-grid">
            <button class="activity-btn" data-cat="facilities" data-keyword="FIRST FAIRWAY COG GOLF COURSE">First
                Fairway</button>
            <button class="activity-btn" data-cat="facilities" data-keyword="FINAL FRINGE COG GOLF COURSE">Final
                Fringe</button>
        </div>

    </div>

    <div class="divider"></div>

    <div class="watch-wrap">
        <button class="watch-btn" id="watchBtn" disabled>
            <span>🔍</span> <span id="watchBtnText">Select an activity first</span>
        </button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
