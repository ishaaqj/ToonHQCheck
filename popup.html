<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>ToonHQ Notify</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --red: #9b151d;
            --red-dark: #6e0e14;
            --red-light: #c9282f;
            --cream: #fdf6e3;
            --gold: #f5c518;
            --blue: #1a6ea8;
            --green: #2a9d3e;
            --text: #2b1a1a;
            --muted: #7a5c5c;
            --card-bg: #fff8f0;
            --border: #e8d5c4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 340px;
            background: var(--cream);
            font-family: 'Nunito', sans-serif;
            color: var(--text);
            overflow-x: hidden;
        }

        /* HEADER */
        .header {
            background: var(--red);
            padding: 14px 16px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            right: 0;
            height: 20px;
            background: var(--cream);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
        }

        .header-icon {
            font-size: 28px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .header-title {
            font-family: 'Fredoka One', cursive;
            font-size: 20px;
            color: #fff;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            line-height: 1;
        }

        .header-sub {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.75);
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* STATUS BAR */
        .status-bar {
            margin: 16px 14px 0;
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ccc;
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .status-dot.active {
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }

        .status-dot.watching {
            background: var(--gold);
            box-shadow: 0 0 6px var(--gold);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        .status-text {
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .status-text span {
            color: var(--red);
        }

        .clear-btn {
            font-size: 11px;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            color: var(--muted);
            background: none;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            padding: 3px 9px;
            cursor: pointer;
            transition: all 0.15s;
            display: none;
        }

        .clear-btn:hover {
            border-color: var(--red);
            color: var(--red);
        }

        /* SECTION LABEL */
        .section-label {
            font-family: 'Fredoka One', cursive;
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 14px 16px 6px;
        }

        /* CATEGORY TABS */
        .tabs {
            display: flex;
            gap: 6px;
            padding: 0 14px 8px;
        }

        .tab {
            flex: 1;
            font-family: 'Fredoka One', cursive;
            font-size: 12px;
            letter-spacing: 0.3px;
            padding: 7px 4px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
            background: var(--card-bg);
            color: var(--muted);
            border-color: var(--border);
        }

        .tab:hover {
            transform: translateY(-1px);
        }

        .tab.active-tab {
            color: #fff;
            border-color: transparent;
        }

        .tab[data-cat="bosses"].active-tab {
            background: var(--red);
        }

        .tab[data-cat="buildings"].active-tab {
            background: var(--blue);
        }

        .tab[data-cat="other"].active-tab {
            background: var(--green);
        }

        /* BUTTON GRID */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            padding: 0 14px 14px;
        }

        .activity-btn {
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 12.5px;
            padding: 9px 10px;
            border-radius: 9px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
            line-height: 1.3;
        }

        .activity-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.12);
        }

        .activity-btn.selected {
            border-color: transparent;
            color: #fff;
            background: var(--red);
            box-shadow: 0 3px 10px rgba(155, 21, 29, 0.35);
            transform: translateY(-1px);
        }

        .activity-btn[data-cat="buildings"].selected {
            background: var(--blue);
            box-shadow: 0 3px 10px rgba(26, 110, 168, 0.35);
        }

        .activity-btn[data-cat="other"].selected {
            background: var(--green);
            box-shadow: 0 3px 10px rgba(42, 157, 62, 0.35);
        }

        /* WATCH BUTTON */
        .watch-wrap {
            padding: 0 14px 16px;
        }

        .watch-btn {
            width: 100%;
            font-family: 'Fredoka One', cursive;
            font-size: 16px;
            letter-spacing: 0.5px;
            padding: 12px;
            border-radius: 11px;
            border: none;
            background: var(--red);
            color: #fff;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 12px rgba(155, 21, 29, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .watch-btn:hover:not(:disabled) {
            background: var(--red-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(155, 21, 29, 0.4);
        }

        .watch-btn:disabled {
            background: #c9b8b8;
            box-shadow: none;
            cursor: not-allowed;
        }

        .watch-btn.watching-state {
            background: var(--gold);
            color: var(--text);
            box-shadow: 0 4px 12px rgba(245, 197, 24, 0.4);
        }

        .watch-btn.watching-state:hover {
            background: #e6b800;
        }

        /* DIVIDER */
        .divider {
            height: 1.5px;
            background: var(--border);
            margin: 0 14px 12px;
            border-radius: 2px;
        }

        /* PANEL VISIBILITY */
        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-icon">🔔</div>
        <div>
            <div class="header-title">ToonHQ Notify</div>
            <div class="header-sub">Group Match Alerts</div>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-left">
            <div class="status-dot" id="statusDot"></div>
            <div class="status-text" id="statusText">Not watching</div>
        </div>
        <button class="clear-btn" id="clearBtn">Clear</button>
    </div>

    <div class="section-label">Select Activity</div>

    <div class="tabs">
        <div class="tab active-tab" data-cat="bosses">⚔️ Bosses</div>
        <div class="tab" data-cat="buildings">🏢 Buildings</div>
        <div class="tab" data-cat="other">🎯 Other</div>
    </div>

    <!-- BOSSES PANEL -->
    <div class="panel active" id="panel-bosses">
        <div class="btn-grid">
            <button class="activity-btn" data-cat="bosses" data-keyword="VP">VP</button>
            <button class="activity-btn" data-cat="bosses" data-keyword="CFO">CFO</button>
            <button class="activity-btn" data-cat="bosses" data-keyword="CJ">CJ</button>
            <button class="activity-btn" data-cat="bosses" data-keyword="CEO">CEO</button>
            <button class="activity-btn" data-cat="bosses" data-keyword="Field Office">Field Office</button>
        </div>
    </div>

    <!-- BUILDINGS PANEL -->
    <div class="panel" id="panel-buildings">
        <div class="btn-grid">
            <button class="activity-btn" data-cat="buildings" data-keyword="Sellbot Building">Sellbot Bldg</button>
            <button class="activity-btn" data-cat="buildings" data-keyword="Cashbot Building">Cashbot Bldg</button>
            <button class="activity-btn" data-cat="buildings" data-keyword="Lawbot Building">Lawbot Bldg</button>
            <button class="activity-btn" data-cat="buildings" data-keyword="Bossbot Building">Bossbot Bldg</button>
            <button class="activity-btn" data-cat="buildings" data-keyword="Five Story">5-Story</button>
            <button class="activity-btn" data-cat="buildings" data-keyword="Four Story">4-Story</button>
            <button class="activity-btn" data-cat="buildings" data-keyword="Three Story">3-Story</button>
            <button class="activity-btn" data-cat="buildings" data-keyword="Two Story">2-Story</button>
            <button class="activity-btn" data-cat="buildings" data-keyword="One Story">1-Story</button>
        </div>
    </div>

    <!-- OTHER PANEL -->
    <div class="panel" id="panel-other">
        <div class="btn-grid">
            <button class="activity-btn" data-cat="other" data-keyword="Bullion Mint">Bullion Mint</button>
            <button class="activity-btn" data-cat="other" data-keyword="Dollar Mint">Dollar Mint</button>
            <button class="activity-btn" data-cat="other" data-keyword="Coin Mint">Coin Mint</button>
            <button class="activity-btn" data-cat="other" data-keyword="Cog Golf Course">Golf Course</button>
            <button class="activity-btn" data-cat="other" data-keyword="DA Office">DA Office</button>
            <button class="activity-btn" data-cat="other" data-keyword="Minigolf">Minigolf</button>
        </div>
    </div>

    <div class="divider"></div>

    <div class="watch-wrap">
        <button class="watch-btn" id="watchBtn" disabled>
            <span>🔍</span> <span id="watchBtnText">Select an activity first</span>
        </button>
    </div>
    <script src="popup.js"></script>
</body>

</html>
